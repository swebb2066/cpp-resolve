# Uncomment the class property to enable debugging for that class
log4j.rootCategory=INFO, A1

log4j.appender.A1=org.apache.log4j.FileAppender
log4j.appender.A1.File=${PROGRAM_FILE_PATH.PARENT_PATH}/${PROGRAM_FILE_PATH.STEM}.log
log4j.appender.A1.Append=false
log4j.appender.A1.layout=org.apache.log4j.PatternLayout
log4j.appender.A1.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %.30c - %m%n

# Uncomment to enable logging
#log4j.logger.CppFile=DEBUG
#log4j.logger.DirectoryEntryIterator=DEBUG
#log4j.logger.FunctionIterator=DEBUG
